<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    text-align: center;
  }

  .container {
    background: white;
    padding: 30px;
    margin: 50px auto;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
  }

  button {
    padding: 12px;
    width: 100%;
    background: #1e40af;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }

  button:hover {
    background: #1e3a8a;
  }

  #mensagem {
    margin-top: 15px;
    font-weight: bold;
    color: #333;
  }

</style>

</head>

<body>

<div class="container">

  <h2>Cadastro</h2>

  <input type="text" id="nome" placeholder="Digite seu nome">
  <input type="email" id="email" placeholder="Digite seu e-mail">
  <input type="number" id="idade" placeholder="Digite sua idade">

  <button onclick="validar()">Enviar</button>

  <p id="mensagem"></p>

</div>

<script>
function validar() {
  // Captura dos valores
  var nome = document.getElementById("nome").value.trim();
  var email = document.getElementById("email").value.trim();
  var idade = document.getElementById("idade").value;
  var msgElemento = document.getElementById("mensagem");

  // 1. Validação de campos vazios
  if (nome === "" || email === "" || idade === "") {
    msgElemento.innerText = "⚠️ Preencha todos os campos!";
    msgElemento.style.color = "orange";
  } 
  // 2. Nova Validação: Formato de e-mail simples
  else if (!email.includes("@") || !email.includes(".")) {
    msgElemento.innerText = "📧 Por favor, insira um e-mail válido.";
    msgElemento.style.color = "red";
  }
  // 3. Validação de idade
  else if (idade < 18) {
    msgElemento.innerText = "Ops, " + nome + "! Você precisa ser maior de idade para se cadastrar.";
    msgElemento.style.color = "red";
  } 
  // Sucesso
  else {
    msgElemento.innerText = "✅ Sucesso! Seja bem-vindo(a), " + nome + "!";
    msgElemento.style.color = "green";
  }
}
</script>

</body>
</html>
